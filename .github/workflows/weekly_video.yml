name: Weekly video pipeline

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday 2:00 AM UTC (7:45 AM Nepal time, NPT = UTC+5:45)
  workflow_dispatch:        # Also triggerable manually from the GitHub Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu-core

          # Optional: Noto fonts for better Devanagari rendering in PIL
          # sudo apt-get install -y fonts-noto-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Google Drive
          DRIVE_FOLDER_ID:         ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

          # AI
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          TOGETHER_API_KEY:        ${{ secrets.TOGETHER_API_KEY }}

          # Switch: set to "true" for paid AI images, "false" for free PIL cards
          USE_AI_IMAGES:           ${{ secrets.USE_AI_IMAGES }}

          # YouTube
          YT_CLIENT_ID:            ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:        ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:        ${{ secrets.YT_REFRESH_TOKEN }}

          # Facebook / Instagram
          FB_ACCESS_TOKEN:         ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID:              ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID:              ${{ secrets.IG_USER_ID }}

        run: python pipeline.py
